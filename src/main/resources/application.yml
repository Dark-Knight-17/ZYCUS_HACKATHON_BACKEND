server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hackathon
    username: postgres
    password: root
  #datasource:
    #url: jdbc:h2:mem:testdb
    #driver-class-name: org.h2.Driver
    #username: sa
    #password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG